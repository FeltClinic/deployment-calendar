<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Release Timeline (Standalone)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-gray-50">
    <div id="root" class="p-2 sm:p-4"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      /**
       * Release Timeline — standalone, no-build HTML
       * - 3-month window you can page month-by-month
       * - Drag events across days
       * - Drag ranges: first day adjusts start, last day adjusts end, middle moves whole range
       * - Events always render above ranges
       * - Autosaves to localStorage
       */

      // -----------------------------
      // Constants
      // -----------------------------
      const STORAGE_KEY = "releaseTimelineState.v6";
      const DAY_MS = 24 * 60 * 60 * 1000;
      const MONTHS = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];
      const WEEKDAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const WEEKDAYS_SHORT = ["S", "M", "T", "W", "T", "F", "S"];

      // -----------------------------
      // Date helpers
      // -----------------------------
      const startOfDay = (d) =>
        new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const toISO = (d) =>
        `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      const fromISO = (s) => {
        const [y, m, dd] = s.split("-").map(Number);
        return new Date(y, m - 1, dd);
      };
      const addDays = (d, n) => {
        const x = new Date(d);
        x.setDate(x.getDate() + n);
        return x;
      };
      const dayDiff = (a, b) =>
        Math.round((a.getTime() - b.getTime()) / DAY_MS);
      const isSameDay = (a, b) =>
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();

      const startOfMonth = (y, m) => new Date(y, m, 1);
      const endOfMonth = (y, m) => new Date(y, m + 1, 0);
      const monthKey = (y, m) => `${y}-${String(m + 1).padStart(2, "0")}`;
      const addMonths = (y, m, delta) => {
        const d = new Date(y, m, 1);
        d.setMonth(d.getMonth() + delta);
        return { y: d.getFullYear(), m: d.getMonth() };
      };

      // Build weeks for a month.
      // - Covers the full month
      // - Ensures at least 5 weeks so shorter months don't leave a blank hole
      // - Uses 6 weeks only when needed
      function getMonthWeeks(year, monthIndex, minWeeks = 5) {
        const first = startOfMonth(year, monthIndex);
        const last = endOfMonth(year, monthIndex);

        // Start on the Sunday on/before the 1st
        const start = new Date(first);
        start.setDate(first.getDate() - ((first.getDay() + 7) % 7));

        const weeks = [];
        let cur = new Date(start);

        const pushWeek = () => {
          const row = [];
          for (let i = 0; i < 7; i++) {
            row.push(new Date(cur));
            cur.setDate(cur.getDate() + 1);
          }
          weeks.push(row);
        };

        while (true) {
          pushWeek();
          if (cur > last && cur.getDay() === 0) break;
        }

        while (weeks.length < minWeeks) pushWeek();

        return weeks;
      }

      // -----------------------------
      // Persistence helpers
      // -----------------------------
      function loadState(defaults) {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaults;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return defaults;
          return { ...defaults, ...parsed };
        } catch {
          return defaults;
        }
      }
      function saveState(state) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch {}
      }
      function useAutoSave(state) {
        const ref = useRef(state);
        useEffect(() => {
          ref.current = state;
        });
        useEffect(() => {
          const id = setInterval(() => saveState(ref.current), 400);
          return () => clearInterval(id);
        }, []);
      }

      // Prevent text selection during drag
      function setGlobalSelecting(enabled) {
        const b = document.body;
        if (enabled) b.classList.remove("select-none");
        else b.classList.add("select-none");
      }

      // -----------------------------
      // Components
      // -----------------------------
      function Header({
        title,
        setTitle,
        windowStartYear,
        windowStartMonth,
        jumpOptions,
        onPrev,
        onNext,
        onJump,
        onExport,
        onImport,
        onReset,
      }) {
        return (
          <div className="bg-white border rounded-xl shadow-sm p-3">
            <div className="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
              <div className="flex items-center gap-3 flex-wrap">
                <input
                  className="text-xl font-semibold bg-transparent border-b border-transparent focus:border-gray-300 focus:outline-none px-1 py-1"
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  aria-label="Title"
                />
              </div>

              <div className="flex items-center gap-2 flex-wrap">
                <button
                  className="border rounded-md px-2 py-2 bg-white text-sm"
                  onClick={onPrev}
                  title="Previous month"
                >
                  ‹
                </button>
                <select
                  className="border rounded-md px-2 py-2 bg-white text-sm"
                  value={monthKey(windowStartYear, windowStartMonth)}
                  onChange={(e) => onJump(e.target.value)}
                >
                  {jumpOptions.map((o) => (
                    <option key={o.value} value={o.value}>
                      {o.label}
                    </option>
                  ))}
                </select>
                <button
                  className="border rounded-md px-2 py-2 bg-white text-sm"
                  onClick={onNext}
                  title="Next month"
                >
                  ›
                </button>

                <span className="w-px h-6 bg-gray-200 mx-1 hidden md:block"></span>

                <button
                  className="border rounded-md px-2 py-2 bg-white text-sm"
                  onClick={onExport}
                >
                  Export
                </button>
                <label className="border rounded-md px-2 py-2 bg-white text-sm cursor-pointer">
                  Import
                  <input
                    type="file"
                    accept="application/json"
                    className="hidden"
                    onChange={(e) =>
                      e.target.files?.[0] && onImport(e.target.files[0])
                    }
                  />
                </label>
                <button
                  className="border rounded-md px-2 py-2 bg-red-50 text-sm"
                  onClick={onReset}
                >
                  Reset
                </button>
              </div>
            </div>
          </div>
        );
      }

      function MonthView({
        year,
        month,
        today,
        events,
        ranges,
        onEventDragStart,
        onRangeDragStart,
        onRangeResizeStart,
        onRangeResizeEnd,
      }) {
        const weeks = useMemo(
          () => getMonthWeeks(year, month, 5),
          [year, month],
        );

        return (
          <div className="bg-white border rounded-xl shadow-sm">
            <div className="px-4 py-3 border-b font-medium">
              {MONTHS[month]} {year}
            </div>
            <div className="p-3">
              <div className="grid grid-cols-7 text-xs text-gray-500 mb-1">
                {WEEKDAYS.map((d, i) => (
                  <div key={d} className="text-center py-1">
                    <span className="hidden sm:inline">{d}</span>
                    <span className="sm:hidden">{WEEKDAYS_SHORT[i]}</span>
                  </div>
                ))}
              </div>
              <div className="grid grid-cols-7 gap-px bg-gray-200 rounded-lg overflow-hidden">
                {weeks.flat().map((date, idx) => {
                  const iso = toISO(date);
                  const inMonth = date.getMonth() === month;
                  const isToday = isSameDay(date, today);
                  const cellPast = startOfDay(date) < today;

                  const dayEvents = events.filter((e) => e.dateISO === iso);
                  const rangesInCell = ranges.filter((r) => {
                    const s = fromISO(r.startISO);
                    const endEx = addDays(s, r.length);
                    return date >= s && date < endEx;
                  });

                  return (
                    <div
                      key={`${iso}-${idx}`}
                      data-date={iso}
                      className={`relative min-h-[60px] sm:min-h-[100px] lg:min-h-[150px] p-1 sm:p-2 bg-white ${!inMonth ? "opacity-50" : ""} hover:bg-blue-50/40 transition-colors overflow-hidden`}
                    >
                      {/* Strong today highlight */}
                      {isToday && (
                        <div className="absolute inset-0 bg-blue-50/40 pointer-events-none z-0" />
                      )}
                      {isToday && (
                        <div className="absolute inset-0 rounded-md ring-4 ring-blue-600 pointer-events-none z-50" />
                      )}

                      {/* Ranges (below events) */}
                      {rangesInCell.map((r) => {
                        const s = fromISO(r.startISO);
                        const endEx = addDays(s, r.length);
                        const isStart = isSameDay(date, s);
                        const isEnd = isSameDay(date, addDays(endEx, -1));
                        const rangePast = endEx <= today;
                        const faded = cellPast || rangePast;

                        return (
                          <div
                            key={r.id}
                            className={`absolute inset-0 rounded-md cursor-move select-none z-10 ${faded ? "opacity-40" : ""}`}
                            onPointerDown={(e) => {
                              e.preventDefault();
                              if (isStart) onRangeResizeStart(r.id);
                              else if (isEnd) onRangeResizeEnd(r.id);
                              else onRangeDragStart(r.id, iso);
                            }}
                            style={{
                              background: r.color + "22",
                              outline:
                                isStart || isEnd
                                  ? `2px solid ${r.color}`
                                  : undefined,
                              boxShadow:
                                isStart || isEnd
                                  ? `inset 0 0 0 1px ${r.color}`
                                  : undefined,
                            }}
                          >
                            {isStart && (
                              <div className="absolute left-1 sm:left-2 top-1 sm:top-2">
                                <span
                                  className="px-1 sm:px-2 py-0.5 text-[9px] sm:text-xs rounded-md text-white truncate max-w-[60px] sm:max-w-none inline-block"
                                  style={{ background: r.color }}
                                >
                                  {r.label}
                                </span>
                              </div>
                            )}
                          </div>
                        );
                      })}

                      {/* Day number */}
                      <div
                        className={`absolute right-1 sm:right-2 bottom-1 sm:bottom-2 text-[9px] sm:text-[10px] z-30 ${cellPast ? "text-gray-400" : "text-gray-500"}`}
                      >
                        {date.getDate()}
                      </div>

                      {/* Events (always on top). No horizontal scrollbars; wrap long text. */}
                      <div className="relative space-y-0.5 sm:space-y-1 pt-4 sm:pt-8 z-40 max-h-[40px] sm:max-h-[60px] lg:max-h-[110px] overflow-y-auto overflow-x-hidden pr-1">
                        {dayEvents.map((evt) => {
                          const evtPast = fromISO(evt.dateISO) < today;
                          return (
                            <div
                              key={evt.id}
                              className={`block w-full max-w-full rounded-md text-[10px] sm:text-xs cursor-grab active:cursor-grabbing shadow select-none bg-white/85 backdrop-blur px-1 sm:px-2 py-0.5 sm:py-1 ${evtPast ? "opacity-45" : ""}`}
                              style={{ border: `1px solid ${evt.color}` }}
                              onPointerDown={(e) => {
                                e.preventDefault();
                                onEventDragStart(evt.id, iso);
                              }}
                              title={evt.label}
                            >
                              <div className="font-medium text-gray-900 whitespace-normal break-words leading-snug">
                                {evt.label}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      function EventsEditor({ events, setEvents, onAdd, onDelete }) {
        return (
          <div className="bg-white border rounded-xl shadow-sm">
            <div className="px-4 py-3 border-b font-medium flex items-center justify-between">
              <span>Events</span>
              <button
                className="border rounded-md px-2 py-1 bg-white text-sm"
                onClick={onAdd}
              >
                Add event
              </button>
            </div>
            <div className="p-3 space-y-3">
              {events.map((evt) => (
                <div
                  key={evt.id}
                  className="grid grid-cols-2 sm:grid-cols-12 gap-2 items-end p-2 rounded-lg border"
                >
                  <div className="col-span-2 sm:col-span-5">
                    <label className="text-xs text-gray-500">Label</label>
                    <input
                      className="w-full border rounded-md px-2 py-2"
                      value={evt.label}
                      onChange={(e) =>
                        setEvents((prev) =>
                          prev.map((x) =>
                            x.id === evt.id
                              ? { ...x, label: e.target.value }
                              : x,
                          ),
                        )
                      }
                    />
                  </div>
                  <div className="col-span-1 sm:col-span-4">
                    <label className="text-xs text-gray-500">Date</label>
                    <input
                      type="date"
                      className="w-full border rounded-md px-2 py-2"
                      value={evt.dateISO}
                      onChange={(e) =>
                        setEvents((prev) =>
                          prev.map((x) =>
                            x.id === evt.id
                              ? { ...x, dateISO: e.target.value }
                              : x,
                          ),
                        )
                      }
                    />
                  </div>
                  <div className="col-span-1 sm:col-span-2 flex gap-2 items-end">
                    <div className="flex-1">
                      <label className="text-xs text-gray-500">Color</label>
                      <input
                        type="color"
                        className="w-full h-[42px] border rounded-md px-2"
                        value={evt.color}
                        onChange={(e) =>
                          setEvents((prev) =>
                            prev.map((x) =>
                              x.id === evt.id
                                ? { ...x, color: e.target.value }
                                : x,
                            ),
                          )
                        }
                      />
                    </div>
                    <button
                      className="border rounded-md px-2 py-2 bg-red-50 shrink-0"
                      onClick={() => onDelete(evt.id)}
                    >
                      ✕
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function RangesEditor({ ranges, setRanges, onAdd, onDelete }) {
        return (
          <div className="bg-white border rounded-xl shadow-sm">
            <div className="px-4 py-3 border-b font-medium flex items-center justify-between">
              <span>Ranges</span>
              <button
                className="border rounded-md px-2 py-1 bg-white text-sm"
                onClick={onAdd}
              >
                Add range
              </button>
            </div>
            <div className="p-3 space-y-3">
              {ranges.map((r) => (
                <div
                  key={r.id}
                  className="grid grid-cols-2 sm:grid-cols-12 gap-2 items-end p-2 rounded-lg border"
                >
                  <div className="col-span-2 sm:col-span-4">
                    <label className="text-xs text-gray-500">Label</label>
                    <input
                      className="w-full border rounded-md px-2 py-2"
                      value={r.label}
                      onChange={(e) =>
                        setRanges((prev) =>
                          prev.map((x) =>
                            x.id === r.id ? { ...x, label: e.target.value } : x,
                          ),
                        )
                      }
                    />
                  </div>
                  <div className="col-span-1 sm:col-span-3">
                    <label className="text-xs text-gray-500">Start</label>
                    <input
                      type="date"
                      className="w-full border rounded-md px-2 py-2"
                      value={r.startISO}
                      onChange={(e) =>
                        setRanges((prev) =>
                          prev.map((x) =>
                            x.id === r.id
                              ? { ...x, startISO: e.target.value }
                              : x,
                          ),
                        )
                      }
                    />
                  </div>
                  <div className="col-span-1 sm:col-span-2">
                    <label className="text-xs text-gray-500">Days</label>
                    <input
                      type="number"
                      min="1"
                      className="w-full border rounded-md px-2 py-2"
                      value={r.length}
                      onChange={(e) =>
                        setRanges((prev) =>
                          prev.map((x) =>
                            x.id === r.id
                              ? {
                                  ...x,
                                  length: Math.max(
                                    1,
                                    Number(e.target.value || 1),
                                  ),
                                }
                              : x,
                          ),
                        )
                      }
                    />
                  </div>
                  <div className="col-span-2 sm:col-span-3 flex gap-2 items-end">
                    <div className="flex-1">
                      <label className="text-xs text-gray-500">Color</label>
                      <input
                        type="color"
                        className="w-full h-[42px] border rounded-md px-2"
                        value={r.color}
                        onChange={(e) =>
                          setRanges((prev) =>
                            prev.map((x) =>
                              x.id === r.id ? { ...x, color: e.target.value } : x,
                            ),
                          )
                        }
                      />
                    </div>
                    <button
                      className="border rounded-md px-2 py-2 bg-red-50 shrink-0"
                      onClick={() => onDelete(r.id)}
                    >
                      ✕
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // -----------------------------
      // App
      // -----------------------------
      function App() {
        const now = new Date();
        const today = startOfDay(now);

        const defaultWindow = {
          startYear: now.getFullYear(),
          startMonth: now.getMonth(),
        };
        const defaults = useMemo(
          () => ({
            title: "Release Timeline",
            window: defaultWindow,
            events: [
              {
                id: "e1",
                label: "Alpha",
                color: "#d50000",
                dateISO: toISO(addDays(now, 7)),
              },
              {
                id: "e2",
                label: "Friends & Family",
                color: "#33b679",
                dateISO: toISO(addDays(now, 21)),
              },
              {
                id: "e3",
                label: "App Store Submit",
                color: "#1a73e8",
                dateISO: toISO(addDays(now, 35)),
              },
            ],
            ranges: [
              {
                id: "r1",
                label: "Staged Rollout",
                color: "#f6bf26",
                startISO: toISO(addDays(now, 28)),
                length: 7,
              },
              {
                id: "r2",
                label: "Code Freeze",
                color: "#8e24aa",
                startISO: toISO(addDays(now, 18)),
                length: 5,
              },
            ],
          }),
          [],
        );

        const persisted = loadState(defaults);

        const [title, setTitle] = useState(persisted.title ?? defaults.title);
        const [windowStartYear, setWindowStartYear] = useState(
          persisted.window?.startYear ?? defaultWindow.startYear,
        );
        const [windowStartMonth, setWindowStartMonth] = useState(
          persisted.window?.startMonth ?? defaultWindow.startMonth,
        );
        const [events, setEvents] = useState(
          persisted.events ?? defaults.events,
        );
        const [ranges, setRanges] = useState(
          persisted.ranges ?? defaults.ranges,
        );

        useAutoSave({
          title,
          window: { startYear: windowStartYear, startMonth: windowStartMonth },
          events,
          ranges,
        });

        const visibleMonths = useMemo(
          () =>
            [0, 1, 2].map((i) =>
              addMonths(windowStartYear, windowStartMonth, i),
            ),
          [windowStartYear, windowStartMonth],
        );

        // Drag state
        const dragState = useRef(null);
        const [hoverISO, setHoverISO] = useState(null);

        // Move target detection
        useEffect(() => {
          function onMove(ev) {
            if (!dragState.current) return;
            const el = document.elementFromPoint(ev.clientX, ev.clientY);
            const cell = el && el.closest && el.closest("[data-date]");
            const iso = cell && cell.getAttribute("data-date");
            if (iso) setHoverISO(iso);
          }
          function onUp() {
            if (!dragState.current) return;
            const state = dragState.current;
            dragState.current = null;
            const iso = hoverISO;
            if (!iso) {
              setGlobalSelecting(true);
              return;
            }

            // Clamp to visible 3-month window
            const windowStartDate = startOfMonth(
              windowStartYear,
              windowStartMonth,
            );
            const last = addMonths(windowStartYear, windowStartMonth, 2);
            const windowEndDate = endOfMonth(last.y, last.m);
            const clamp = (d) =>
              d < windowStartDate
                ? new Date(windowStartDate)
                : d > windowEndDate
                  ? new Date(windowEndDate)
                  : d;

            if (state.kind === "event") {
              setEvents((prev) =>
                prev.map((e) =>
                  e.id === state.id
                    ? { ...e, dateISO: toISO(clamp(fromISO(iso))) }
                    : e,
                ),
              );
            }

            if (state.kind === "range-move") {
              setRanges((prev) =>
                prev.map((r) => {
                  if (r.id !== state.id) return r;
                  let newStart = addDays(fromISO(iso), -state.offset);
                  const latestStart = addDays(windowEndDate, -(r.length - 1));
                  if (newStart < windowStartDate)
                    newStart = new Date(windowStartDate);
                  if (newStart > latestStart) newStart = latestStart;
                  return { ...r, startISO: toISO(newStart) };
                }),
              );
            }

            if (state.kind === "range-resize-left") {
              setRanges((prev) =>
                prev.map((r) => {
                  if (r.id !== state.id) return r;
                  let newStart = fromISO(iso);
                  const endEx = addDays(fromISO(r.startISO), r.length);
                  if (newStart >= endEx) newStart = addDays(endEx, -1);
                  if (newStart < windowStartDate)
                    newStart = new Date(windowStartDate);
                  const newLen = Math.max(1, dayDiff(endEx, newStart));
                  return { ...r, startISO: toISO(newStart), length: newLen };
                }),
              );
            }

            if (state.kind === "range-resize-right") {
              setRanges((prev) =>
                prev.map((r) => {
                  if (r.id !== state.id) return r;
                  let newEndEx = addDays(fromISO(iso), 1);
                  const start = fromISO(r.startISO);
                  if (newEndEx <= start) newEndEx = addDays(start, 1);
                  if (newEndEx > addDays(windowEndDate, 1))
                    newEndEx = addDays(windowEndDate, 1);
                  const newLen = Math.max(1, dayDiff(newEndEx, start));
                  return { ...r, length: newLen };
                }),
              );
            }

            setHoverISO(null);
            setGlobalSelecting(true);
          }

          window.addEventListener("pointermove", onMove);
          window.addEventListener("pointerup", onUp);
          return () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
          };
        }, [hoverISO, windowStartYear, windowStartMonth]);

        // Drag starters
        function onEventDragStart(id, iso) {
          dragState.current = { kind: "event", id };
          setHoverISO(iso);
          setGlobalSelecting(false);
        }
        function onRangeDragStart(id, iso) {
          const r = ranges.find((x) => x.id === id);
          if (!r) return;
          const offset = dayDiff(fromISO(iso), fromISO(r.startISO));
          dragState.current = { kind: "range-move", id, offset };
          setHoverISO(iso);
          setGlobalSelecting(false);
        }
        function onRangeResizeStart(id) {
          dragState.current = { kind: "range-resize-left", id };
          setGlobalSelecting(false);
        }
        function onRangeResizeEnd(id) {
          dragState.current = { kind: "range-resize-right", id };
          setGlobalSelecting(false);
        }

        // Header actions
        function pageMonths(delta) {
          const next = addMonths(windowStartYear, windowStartMonth, delta);
          setWindowStartYear(next.y);
          setWindowStartMonth(next.m);
        }
        function jumpToMonth(ym) {
          const [yy, mm] = ym.split("-").map(Number);
          setWindowStartYear(yy);
          setWindowStartMonth(mm - 1);
        }
        const jumpOptions = useMemo(() => {
          const opts = [];
          for (let i = -12; i <= 12; i++) {
            const { y, m } = addMonths(windowStartYear, windowStartMonth, i);
            opts.push({ value: monthKey(y, m), label: `${MONTHS[m]} ${y}` });
          }
          const seen = new Set();
          return opts.filter((o) =>
            seen.has(o.value) ? false : (seen.add(o.value), true),
          );
        }, [windowStartYear, windowStartMonth]);

        function onReset() {
          localStorage.removeItem(STORAGE_KEY);
          location.reload();
        }
        function onExport() {
          const data = {
            title,
            window: {
              startYear: windowStartYear,
              startMonth: windowStartMonth,
            },
            events,
            ranges,
          };
          const blob = new Blob([JSON.stringify(data, null, 2)], {
            type: "application/json",
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "release_timeline.json";
          a.click();
          URL.revokeObjectURL(url);
        }
        function onImport(file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = JSON.parse(e.target.result);
              if (typeof data.title === "string") setTitle(data.title);
              if (data.window?.startYear != null)
                setWindowStartYear(data.window.startYear);
              if (data.window?.startMonth != null)
                setWindowStartMonth(data.window.startMonth);
              if (Array.isArray(data.events)) setEvents(data.events);
              if (Array.isArray(data.ranges)) setRanges(data.ranges);
              saveState({
                title: data.title ?? title,
                window: data.window ?? {
                  startYear: windowStartYear,
                  startMonth: windowStartMonth,
                },
                events: data.events ?? events,
                ranges: data.ranges ?? ranges,
              });
            } catch {
              alert("Invalid JSON");
            }
          };
          reader.readAsText(file);
        }

        // Add/remove
        const addEvent = () =>
          setEvents((prev) => [
            ...prev,
            {
              id: "e" + Math.random().toString(36).slice(2, 8),
              label: "New Event",
              color: "#1a73e8",
              dateISO: toISO(startOfMonth(windowStartYear, windowStartMonth)),
            },
          ]);
        const delEvent = (id) =>
          setEvents((prev) => prev.filter((e) => e.id !== id));
        const addRange = () =>
          setRanges((prev) => [
            ...prev,
            {
              id: "r" + Math.random().toString(36).slice(2, 8),
              label: "New Range",
              color: "#33b679",
              startISO: toISO(startOfMonth(windowStartYear, windowStartMonth)),
              length: 5,
            },
          ]);
        const delRange = (id) =>
          setRanges((prev) => prev.filter((r) => r.id !== id));

        return (
          <div className="space-y-4">
            <Header
              title={title}
              setTitle={setTitle}
              windowStartYear={windowStartYear}
              windowStartMonth={windowStartMonth}
              jumpOptions={jumpOptions}
              onPrev={() => pageMonths(-1)}
              onNext={() => pageMonths(1)}
              onJump={jumpToMonth}
              onExport={onExport}
              onImport={onImport}
              onReset={onReset}
            />

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
              {visibleMonths.map(({ y, m }) => (
                <MonthView
                  key={`${y}-${m}`}
                  year={y}
                  month={m}
                  today={today}
                  events={events}
                  ranges={ranges}
                  onEventDragStart={onEventDragStart}
                  onRangeDragStart={onRangeDragStart}
                  onRangeResizeStart={onRangeResizeStart}
                  onRangeResizeEnd={onRangeResizeEnd}
                />
              ))}
            </div>

            <div className="grid md:grid-cols-2 gap-4">
              <EventsEditor
                events={events}
                setEvents={setEvents}
                onAdd={addEvent}
                onDelete={delEvent}
              />
              <RangesEditor
                ranges={ranges}
                setRanges={setRanges}
                onAdd={addRange}
                onDelete={delRange}
              />
            </div>

            <div className="text-xs text-gray-500">
              Autosaves locally. Use the month dropdown + arrows to page. Drag
              events to move them. For ranges: drag the first day to adjust the
              start, the last day to adjust the end, or any middle day to move
              the whole range.
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
